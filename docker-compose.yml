version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - backend_data:/app/data
    environment:
      - DATABASE_URL=file:../data/dev.db
      - JWT_SECRET=allride-super-secret-key-2026
      - MAPBOX_SECRET_TOKEN=sk.eyJ1IjoiZGpiYjE2MDg4MyIsImEiOiJjbW9kNDdnMncwN2NrMm5wdnc3bXFpbTQ5In0.e1U1-wl6D6CElaFNv_t9SA
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_MAPBOX_PUBLIC_TOKEN=pk.eyJ1IjoiZGpiYjE2MDg4MyIsImEiOiJjbWl4ZnVocGMwM3k4M2xvOXkzMXY2eWxhIn0.yNlKzNWQ7gwTGSCq5jI6IA
        - VITE_API_URL=https://api.tudominio.com # Cambiar por tu URL de Dokploy
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend_data:
