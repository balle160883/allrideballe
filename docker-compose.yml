version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - backend_data:/app/data
    environment:
      - DATABASE_URL=file:../data/dev.db
      - JWT_SECRET=allride-super-secret-key-2026
      - MAPBOX_SECRET_TOKEN=${MAPBOX_SECRET_TOKEN}
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_MAPBOX_PUBLIC_TOKEN=${VITE_MAPBOX_PUBLIC_TOKEN}
        - VITE_API_URL=http://2.24.81.205:3001
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend_data:
